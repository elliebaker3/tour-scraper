<!doctype html>
<!-- Test harness: stubs the chrome extension APIs so navigator.js can be loaded
     in a plain page and its rendering asserted. Copied into extension/ for the
     duration of a test run (it must be same-origin with data/) and deleted
     afterwards -- see tests/test_extension_profile.py. -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="navigator.css"></head>
<body style="margin:0;background:#111;height:100vh">
<script>
  const qs = new URLSearchParams(location.search);
  const pinned = qs.get("stage") ? Number(qs.get("stage")) : null;
  window.chrome = {
    runtime: { getURL: (p) => new URL(p, location.href).href },
    storage: { local: {
      get: (keys, cb) => {
        const out = pinned ? { tnPinnedStage: pinned } : {};
        // Simulate a calibration left behind by an older extension version:
        // no `v`, and the rate-fitted 0.9178x that a two-pin fit produced.
        if (qs.get("stalecal") === "1") {
          out["tourNavigatorAnchors:stage-" + (pinned || 14)] = {
            anchors: [{ tUtcMs: Date.parse("2026-07-18T11:35:38Z"), videoSec: 3938 }],
            cal: { refMs: Date.parse("2026-07-18T11:35:38Z"),
                   offsetSec: 3938, rate: 0.9178 },
          };
        }
        cb(out);
      },
      remove: () => {},
      set: (obj, cb) => cb && cb(),
    } },
  };

  // Real values captured from the live Peacock player on the stage 14 replay:
  // displayStartTime 2026-07-18T10:30:00Z, runtime 5h20m26s. probe_main.js runs
  // in the page world here, which is the world the manifest gives it too.
  if (qs.get("playbackstate") === "1") {
    window.__PLAYBACK_STATE__ = { assetData: { attributes: {
      title: "Stage 14",
      displayStartTime: 1784370600000,
      eventDetails: {
        eventPlayableStartDate: 1784367000000,
        eventPlayableEndDate: 1784391707000,
      },
    } } };
  }

  // Fake player: duration/currentTime are readonly on a real element, so they
  // are redefined here. Enabled only when ?video=1 so the no-video path is
  // exercised too.
  if (qs.get("video") === "1") {
    const v = document.createElement("video");
    Object.defineProperty(v, "duration", { value: 19225.94, configurable: true });
    let ct = Number(qs.get("t") || 0);
    Object.defineProperty(v, "currentTime", {
      get: () => ct, set: (x) => { ct = x; }, configurable: true,
    });
    document.body.appendChild(v);
  }
</script>
<script src="probe_main.js"></script>
<script src="probe.js"></script>
<script src="navigator.js"></script>
</body></html>
