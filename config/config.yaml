# tour-scraper configuration. Everything here overrides the defaults in
# src/tourscraper/config.py.

base_url: "https://racecenter.letour.fr"
year: 2026
data_dir: "data"

# Live SSE stream (EventSource endpoint used by the racecenter page)
live_stream_endpoint: "/live-stream"

# Static reference endpoints ({year} is substituted)
competitors_endpoint: "/api/allCompetitors-{year}"
stages_endpoint: "/api/stage-{year}"
teams_endpoint: "/api/team-{year}"

# Fallback/complementary pollers -- confirmed live against the real 2026 site
# (2026-07-17, via `autodiscover`) as actual REST JSON endpoints, not guesses:
#   flashInfoLive-{year}-{stage}   -- the detailed timestamped event/commentary
#                                     feed itself (data source #1). Empty `[]`
#                                     off-hours; that's expected pre-race.
#   checkpointList-{year}-{stage}  -- checkpoint locations + pass schedule,
#                                     keyed the same way as the profile CSV's
#                                     cpnumero column -- this is what lets the
#                                     Navigator place the leader on the
#                                     elevation map (data source #2, cross-
#                                     checked against the SSE telemetry).
# Both need --stage passed on the command line to resolve {stage}; without it
# poll_loop skips them rather than polling a broken URL all session.
poll_endpoints:
  flashInfoLive: "/api/flashInfoLive-{year}-{stage}"
  checkpointList: "/api/checkpointList-{year}-{stage}"
poll_interval_seconds: 15

# Radio Tour / live radio stream URL. Find via the HAR command (look for
# audio/mpegurl entries while the radio player is open), then paste here.
radio_stream_url: ""

timeout_seconds: 20
