# Runs the full stage capture on GitHub's servers — your computer can be off.
#
# Two jobs, gated by which schedule fired (see the `if:` on each job), so one
# workflow file covers both:
#
#   discover  - headless-browses racecenter.letour.fr with Playwright to grab
#               whatever needs a real browser session: the elevation-profile
#               CSV (its filename has an unpredictable content hash, not
#               guessable from static HTML/JS) and, best-effort, the radio
#               stream URL. Commits any config.yaml / data changes back to
#               main so the scrape job below picks them up. Runs THREE times
#               (2.5h before / 30min before / at race start) because the
#               profile CSV is available early but the radio stream often
#               only goes live close to actual air time -- each later
#               attempt is a free extra shot at catching it, not a retry of
#               a failure.
#   scrape    - the actual capture: SSE live-stream + the confirmed 2026 REST
#               poll endpoints (flashInfoLive = the event feed, checkpointList
#               = checkpoint pass data) + radio. Commits data/ back when done.
#
# Notes:
# - The schedule below has explicit per-stage crons for stages 16-21 (the rest
#   of the 2026 Tour), each computed from that stage's real start time. If the
#   route changes mid-Tour (it has before -- stage 9 was shortened for heat),
#   re-check data/2026/reference/stages.json and adjust the affected day's two
#   crons. To add a stage: one discover cron at start-90min, one scrape cron at
#   start-25min (both UTC), and add each to the matching job's `if:` below.
# - GitHub-hosted jobs are hard-capped at 6 hours; that's why `scrape` starts
#   close to the actual race start rather than hours early.
# - Radio audio is uploaded as an artifact rather than committed (repo bloat);
#   flip the LFS section in the README if you'd rather commit it.
# - GitHub cron often fires late (observed ~55min on 2026-07-18); a late fire
#   just shifts the capture window later and still catches the finish.

name: scrape-stage

on:
  # EXPLICIT PER-STAGE SCHEDULE for the rest of the 2026 Tour.
  #
  # Start times vary a lot across stages (09:30-14:25 UTC for stages 16-21),
  # and there are rest days, so a single generic "every July day" cron is
  # wrong. Instead each remaining stage gets two crons, computed from its real
  # start time in data/2026/reference/stages.json:
  #   discover = start - 90min   (grabs that stage's elevation-profile CSV +
  #                               refreshes reference data; works pre-race)
  #   scrape   = start - 25min   (starts the capture; scrape auto-detects the
  #                               stage number from today's UTC date, and
  #                               5.5h of capture from 25min-early reaches the
  #                               finish of every remaining stage -- all are
  #                               <=5h -- while ENDING with ~20min of margin
  #                               under GitHub's hard 6h job cap. That margin
  #                               matters: on 2026-07-19 the job ran to the cap,
  #                               was cancelled, and cancellation SKIPS the
  #                               final commit step, losing ~5h50m of stage 15
  #                               data that had been captured but never pushed.)
  # GitHub cron often fires late (observed ~55min on 2026-07-18); if that
  # happens the window just shifts later and still catches the high-value
  # finish -- only the low-value neutralized rollout at the very start is at
  # risk. Times are UTC. Format: "MIN HOUR DAY 7 *".
  schedule:
    # Stage 16 - Mon Jul 21, start 11:00 UTC
    - cron: "30 9 21 7 *"    # discover
    - cron: "35 10 21 7 *"   # scrape
    # Stage 17 - Wed Jul 22, start 11:35 UTC
    - cron: "5 10 22 7 *"    # discover
    - cron: "10 11 22 7 *"    # scrape
    # Stage 18 - Thu Jul 23, start 10:50 UTC
    - cron: "20 9 23 7 *"    # discover
    - cron: "25 10 23 7 *"   # scrape
    # Stage 19 - Fri Jul 24, start 12:15 UTC
    - cron: "45 10 24 7 *"   # discover
    - cron: "50 11 24 7 *"   # scrape
    # Stage 20 - Sat Jul 25, start 09:30 UTC
    - cron: "0 8 25 7 *"     # discover
    - cron: "5 9 25 7 *"    # scrape
    # Stage 21 - Sun Jul 26, start 14:25 UTC (Champs-Elysees, late start)
    - cron: "55 12 26 7 *"   # discover
    - cron: "0 14 26 7 *"   # scrape
  workflow_dispatch:
    inputs:
      stage:
        description: "Stage number (e.g. 14)"
        required: false
      max_hours:
        description: "Hours to record"
        default: "5.5"
      run_discover:
        description: "Also run the discover job"
        type: boolean
        default: true

jobs:
  discover:
    if: >-
      github.event_name == 'workflow_dispatch' && inputs.run_discover ||
      github.event.schedule == '30 9 21 7 *' ||
      github.event.schedule == '5 10 22 7 *' ||
      github.event.schedule == '20 9 23 7 *' ||
      github.event.schedule == '45 10 24 7 *' ||
      github.event.schedule == '0 8 25 7 *' ||
      github.event.schedule == '55 12 26 7 *'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (incl. Playwright + headless Chromium)
        run: |
          pip install -e .
          playwright install --with-deps chromium

      - name: Run autodiscover
        run: python -m tourscraper autodiscover --watch-seconds 150

      - name: Commit any discovered config/data changes
        run: |
          git config user.name "tour-scraper-bot"
          git config user.email "actions@users.noreply.github.com"
          git add config/config.yaml data/
          git commit -m "autodiscover: $(date -u +%F) findings" || echo "nothing to commit"
          for i in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}" && git push && break
            echo "push attempt $i failed (concurrent write?), retrying..."
            git rebase --abort 2>/dev/null || true
            sleep $((i * 5))
          done || echo "push failed after retries; findings are still in the uploaded artifact"

      - name: Upload inventory as artifact too (belt and suspenders)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autodiscover-${{ github.run_id }}
          path: data/*/reference/autodiscover-endpoints.json
          retention-days: 30

  scrape:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '35 10 21 7 *' ||
      github.event.schedule == '10 11 22 7 *' ||
      github.event.schedule == '25 10 23 7 *' ||
      github.event.schedule == '50 11 24 7 *' ||
      github.event.schedule == '5 9 25 7 *' ||
      github.event.schedule == '0 14 26 7 *'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
          pip install -e .

      - name: Determine today's stage number (unless one was given explicitly)
        id: stage
        run: |
          python -m tourscraper bootstrap
          MANUAL="${{ github.event.inputs.stage }}"
          if [ -n "$MANUAL" ]; then
            echo "number=$MANUAL" >> "$GITHUB_OUTPUT"
          else
            STAGE=$(python3 -c "
          import json, datetime
          data = json.load(open('data/2026/reference/stages.json'))
          today = datetime.datetime.now(datetime.timezone.utc).strftime('%Y-%m-%d')
          matches = [s for s in data if str(s.get('date','')).startswith(today)]
          print(matches[0]['stage'] if matches else '')
          ")
            if [ -z "$STAGE" ]; then
              echo "::error::no stage in stages.json matches today's date ($(date -u +%F)) -- pass ?stage= manually via workflow_dispatch"
              exit 1
            fi
            echo "number=$STAGE" >> "$GITHUB_OUTPUT"
          fi

      - name: Run capture (with incremental pushes every 10 min)
        env:
          TOUR_RADIO_URL: ${{ secrets.TOUR_RADIO_URL }}
        run: |
          git config user.name "tour-scraper-bot"
          git config user.email "actions@users.noreply.github.com"
          python -m tourscraper stage \
            --stage "${{ steps.stage.outputs.number }}" \
            --max-hours "${{ github.event.inputs.max_hours || '5.5' }}" &
          CAPTURE_PID=$!
          # Push captured data incrementally so the repo stays fresh during the
          # stage and nothing is lost if the runner dies mid-capture. Audio
          # stays out (gitignored); it lands in the artifact at the end.
          #
          # 300s, not 600: stage 19 (2026-07-24) lost the runner to a GitHub-
          # side "lost communication with the server" about 2h in, and
          # everything captured since the last push -- up to the old 10min
          # window -- died with the VM. Halving the window halves that
          # worst-case loss. It doesn't address the cause (that's GitHub
          # infra, not this workflow -- see salvage-backfill.yml for the
          # actual safety net), just the blast radius.
          while kill -0 $CAPTURE_PID 2>/dev/null; do
            sleep 300
            kill -0 $CAPTURE_PID 2>/dev/null || break
            git add data/
            if git commit -m "data: incremental capture $(date -u +%H:%M) UTC" >/dev/null 2>&1; then
              # -X theirs: during a rebase this favours OUR replayed capture
              # commits, so an append-only data file never deadlocks the push.
              # Retry a couple of times rather than aborting into a state that
              # can never push again (this is what lost stage 15's data).
              for attempt in 1 2 3; do
                if git pull --rebase -X theirs origin "${GITHUB_REF_NAME}" >/dev/null 2>&1 \
                   && git push >/dev/null 2>&1; then
                  echo "pushed incremental at $(date -u +%H:%M)"; break
                fi
                git rebase --abort 2>/dev/null || true
                echo "incremental push attempt $attempt failed; retrying"
                sleep 10
              done
            fi
          done
          wait $CAPTURE_PID

      - name: Upload everything as artifact (belt and suspenders)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-data-${{ github.run_id }}
          path: data/
          retention-days: 30

      - name: Commit data back to repo (excluding audio)
        if: always()
        run: |
          git config user.name "tour-scraper-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git commit -m "data: capture $(date -u +%F)" || echo "nothing to commit"
          for i in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}" && git push && break
            echo "push attempt $i failed (concurrent write?), retrying..."
            git rebase --abort 2>/dev/null || true
            sleep $((i * 5))
          done || echo "push failed after retries; data still in the uploaded artifact"
